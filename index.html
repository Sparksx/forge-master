<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forge Master</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0e0b1a">
    <meta name="description" content="Forge legendary gear, climb the arena, duel real players, and rise with your clan.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Forge Master">
    <link rel="apple-touch-icon" href="/icon-192.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Auth screen (shown until authenticated) -->
    <div class="auth-screen" id="auth-screen" role="main" aria-label="Sign in">
        <div class="auth-container">
            <div class="auth-logo">🔨</div>
            <h1 class="auth-title">Forge Master</h1>
            <p class="auth-subtitle">Forge gear · climb the arena · duel players · rise with your clan</p>

            <div class="auth-oneclick" id="auth-oneclick">
                <button class="auth-btn auth-btn-primary" id="guest-play-btn" type="button">Play Now</button>
                <div class="auth-error" id="guest-error" role="alert" aria-live="polite"></div>

                <div class="auth-divider"><span>or connect with</span></div>

                <div class="auth-oauth-row">
                    <button class="auth-btn auth-btn-discord" id="discord-login-btn" type="button">Discord</button>
                    <button class="auth-btn auth-btn-google" id="google-login-btn" type="button">Google</button>
                </div>

                <p class="auth-switch">Have an account? <a href="#" id="show-login">Log in</a></p>
            </div>

            <form class="auth-form hidden" id="login-form" aria-label="Login form">
                <input type="text" id="login-username" placeholder="Username or Email" required autocomplete="username">
                <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
                <div class="auth-error" id="login-error" role="alert" aria-live="polite"></div>
                <button type="submit" class="auth-btn auth-btn-primary">Log In</button>
                <p class="auth-switch"><a href="#" id="show-oneclick">Back</a> · No account? <a href="#" id="show-register">Register</a></p>
            </form>

            <form class="auth-form hidden" id="register-form" aria-label="Register form">
                <input type="text" id="register-username" placeholder="Username" required minlength="3" maxlength="30" autocomplete="username">
                <input type="email" id="register-email" placeholder="Email" required autocomplete="email">
                <input type="password" id="register-password" placeholder="Password (6+ characters)" required minlength="6" autocomplete="new-password">
                <div class="auth-error" id="register-error" role="alert" aria-live="polite"></div>
                <button type="submit" class="auth-btn auth-btn-primary">Create Account</button>
                <p class="auth-switch"><a href="#" id="show-oneclick-from-register">Back</a> · Already registered? <a href="#" id="show-login-from-register">Log in</a></p>
            </form>
        </div>
    </div>

    <!-- Game (built by the app shell once authenticated) -->
    <div class="hidden" id="game-container" role="main" aria-label="Forge Master"></div>

    <script type="module" src="src/main.js"></script>
</body>

</html>
</content>
